# Aggregate Splits Configuration
# Used by: ced aggregate-splits and ced run-pipeline aggregation stages

# Feature stability and threshold reporting
stability_threshold: 0.75
target_specificity: 0.95
n_boot: 1000

# Specificity targets for additional threshold diagnostics
control_spec_targets:
  - 0.90
  - 0.95
  - 0.99

# Plot output formats (can include multiple, e.g. [png, pdf])
plot_formats:
  - png

# Plot generation controls
save_plots: true
plot_roc: true
plot_pr: true
plot_calibration: true
plot_risk_distribution: true
plot_dca: true
plot_oof_combined: true
plot_learning_curve: true
plot_shap_summary: true
plot_shap_dependence: true
plot_shap_heatmap: true
