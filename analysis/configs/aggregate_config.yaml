# Aggregate Splits Configuration
# Aggregate results across multiple split seeds into summary statistics

# Input/output
results_dir: ../results
outdir: ../results/aggregated

# Discovery
split_pattern: split_seed*  # Pattern to match split directories

# Pooling settings
predictions_method: median  # Options: median, mean, vote
save_individual: false

# Summary statistics
summary_stats:
  - mean
  - std
  - median
  - ci95
group_by:
  - scenario
  - model

# Consensus panels
min_stability: 0.7  # Minimum frequency across splits
corr_method: pearson  # Options: pearson, spearman
corr_threshold: 0.80

# Note: Output controls (save_pooled_preds, save_plots, plot_format, etc.)
# are configured in output_config.yaml under the 'aggregation:' and 'plots:' sections
