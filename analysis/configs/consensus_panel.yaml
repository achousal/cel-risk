# Consensus Panel Configuration
# Configuration for cross-model consensus panel generation via Robust Rank Aggregation

# Stability threshold: minimum selection fraction to include a protein
# Proteins must be selected in >= this fraction of CV folds to be considered "stable"
stability_threshold: 0.95

# Correlation threshold for clustering redundant proteins
# Proteins with |correlation| >= this threshold are grouped, and one representative
# per cluster is kept (the one with highest consensus score)
corr_threshold: 0.75

# Target panel size after correlation pruning
# This is the final number of proteins in the consensus panel
target_size: 25

# RRA aggregation method for combining rankings across models
# Options:
#   - geometric_mean: Geometric mean of reciprocal ranks (penalizes missing proteins)
#   - borda: Borda count (sum of (N - rank + 1) across models)
#   - median: Median rank across models
rra_method: geometric_mean

# Significance Gating
significance:
  require_significance: true    # Only include significant models
  alpha: 0.05                   # Significance threshold
  min_significant_models: 3     # Minimum models required for consensus

# Composite Ranking Weights (per ADR-004)
# OOF importance (primary) + Essentiality (secondary) + Stability (tie-break)
composite_ranking:
  oof_weight: 0.6         # OOF grouped importance (primary signal)
  essentiality_weight: 0.3  # Drop-column essentiality (secondary signal)
  stability_weight: 0.1   # Selection frequency (tie-break)

# Drop-Column Essentiality Validation
# Validates that consensus panel features are truly essential (not redundant)
essentiality:
  enabled: true                 # Run drop-column validation after consensus panel
  include_brier: false          # Include Brier score delta in output
  corr_threshold: 0.75          # Correlation threshold for clustering features
