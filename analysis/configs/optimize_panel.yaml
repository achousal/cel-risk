# Panel Optimization Configuration
# Aggregated RFE to find optimal panel size trade-offs for clinical deployment
#

# RFE Algorithm Parameters
stability_threshold: 0.95    # Minimum selection fraction for stable proteins (default: 0.90)
start_size: 100               # Cap starting panel to top N proteins by selection frequency (null = no cap)
min_size: 5                  # Minimum panel size to evaluate (default: 5)
min_auroc_frac: 0.50         # Early stop if AUROC < this fraction of max (default: 0.90)
cv_folds: 5                  # CV folds for OOF AUROC (0 = skip; 5 recommended for stable estimates)
step_strategy: fine          # Feature elimination: geometric, fine, linear (default: geometric)

# Per-k Hyperparameter Re-tuning
retune_trials: 200            # Optuna trials per evaluation point
retune_cv_folds: 5           # CV folds for per-k Optuna search (was 3; 5 for stable estimates with ~220 positives)

# Correlation-Aware Pruning
corr_aware: true             # Enable correlation-aware redundancy pruning (default: true)
corr_threshold: 0.75         # Correlation threshold for pruning redundant features (default: 0.80)
corr_method: spearman        # Correlation method: spearman or pearson (default: spearman)

# HPC Parallelization (only used with --hpc flag)
n_jobs_hpc: -1               # Number of parallel jobs per model (-1 = all CPUs, only with --hpc)

# Per-k Hyperparameter Search Spaces (mirrors training_config.yaml Optuna ranges)
# Defines Optuna search spaces for per-panel-size re-tuning during RFE.
# Parameter names use clf__ prefix (sklearn Pipeline convention).
# To keep experimental design consistent, these should match training_config.yaml
# Optuna ranges unless you have a specific reason to diverge.

rfe_tune_spaces:
  LR_EN:
    clf__C: {type: float, low: 1.0e-4, high: 1.0, log: true}
    clf__l1_ratio: {type: float, low: 0.0, high: 1.0, log: false}
  LinSVM_cal:
    clf__estimator__C: {type: float, low: 1.0e-3, high: 1.0, log: true}
  # RF and XGBoost: fixed HPs from full-feature training (no per-k re-tuning).
  # Tree ensembles are robust to feature count changes; re-tuning at each k
  # introduces noise and overfitting risk with small positive class.

# Significance Gating
significance:
  require_significance: true    # Skip non-significant models
  alpha: 0.05                   # Significance threshold
