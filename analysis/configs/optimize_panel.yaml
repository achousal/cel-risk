# Panel Optimization Configuration
# Aggregated RFE to find optimal panel size trade-offs for clinical deployment
#
# USAGE (auto-detects paths from run metadata):
#   ced optimize-panel --run-id 20260127_104409                # All models (RECOMMENDED)
#   ced optimize-panel --run-id 20260127_104409 --model LR_EN  # Single model
#
# Reference: docs/reference/FEATURE_SELECTION.md#aggregated-rfe-deployment-optimization

# ==============================================================================
# RFE Algorithm Parameters
# ==============================================================================

stability_threshold: 0.90    # Minimum selection fraction for stable proteins (default: 0.90)
min_size: 5                  # Minimum panel size to evaluate (default: 5)
min_auroc_frac: 0.5         # Early stop if AUROC < this fraction of max (default: 0.90)
cv_folds: 0                  # CV folds for OOF AUROC (default: 0 = skip, validation-only)
step_strategy: fine          # Feature elimination: geometric, linear, fine (default: geometric)

# ==============================================================================
# Per-k Hyperparameter Re-tuning
# ==============================================================================

retune_trials: 40            # Optuna trials per evaluation point (default: 40)

# ==============================================================================
# Correlation-Aware Pruning
# ==============================================================================

corr_aware: true             # Enable correlation-aware redundancy pruning (default: true)
corr_threshold: 0.80         # Correlation threshold for pruning redundant features (default: 0.80)
corr_method: spearman        # Correlation method: spearman or pearson (default: spearman)

# ==============================================================================
# HPC Parallelization (only used with --hpc flag)
# ==============================================================================

n_jobs_hpc: -1                       # Number of parallel jobs per model (-1 = all CPUs, only with --hpc)
