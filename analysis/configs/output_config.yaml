# Output Configuration
# Controls active artifact/plot settings consumed by training + aggregation runtime.

# Artifact saving controls
artifacts:
  # Calibration artifacts
  calib_bins: 6

  # SHAP artifacts
  save_shap_importance: true

# Plot generation controls
plots:
  # Master controls
  save_plots: true
  max_plot_splits: 1
  plot_format: png

  # Standard evaluation plots
  plot_roc: true
  plot_pr: true
  plot_calibration: true
  plot_risk_distribution: true
  plot_dca: true

  # Training and optimization plots
  plot_learning_curve: true
  plot_oof_combined: true
  plot_optuna: true
  optuna_plot_format: html

  # SHAP plots
  plot_shap_summary: true
  plot_shap_waterfall: true
  plot_shap_dependence: true
  plot_shap_heatmap: true
