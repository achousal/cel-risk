# Permutation Test Configuration

# Permutation Test Parameters
n_perms: 200              # Number of permutations (default: 200; increase for tighter p-values)
metric: auroc             # Metric to evaluate (only 'auroc' supported per ADR-007)
random_state: 42          # Random seed for reproducibility

# Split Seed Range
split_seed_start: 10       # First split seed to test
n_split_seeds: 3          # Number of consecutive seeds to test (seeds: start .. start + n - 1)

# Parallelization
n_jobs: 1                 # Parallel jobs for local execution (1 = sequential; -1 = all CPUs)
                          # Note: HPC mode uses job arrays, not n_jobs

# Output Settings
outdir: null              # Output directory (null = auto-detect: {run_dir}/{model}/significance/)
save_individual: true     # Save individual permutation results (for HPC aggregation)

# Aggregation Settings
aggregation:
  method: pooled_null           # pooled_null | fisher | stouffer
  alpha: 0.05
  min_seeds_required: 3         # minimum seeds to aggregate
