# Pipeline Configuration - HPC Environment
# Deep-merged on top of pipeline_local.yaml via _base.
# Only values that differ from local defaults are listed here.

_base: pipeline_local.yaml

environment: hpc

configs:
  training: configs/training_config.yaml

pipeline:
  models:
    - LR_EN
    - LinSVM_cal
    - RF
    - XGBoost
  ensemble: true
  consensus: true
  optimize_panel: true
  permutation_test: true
  dry_run: false

# HPC Settings (LSF/Slurm)
hpc:
  scheduler: lsf  # lsf or slurm
  project: acc_Chipuk_Laboratory  # update before use
  queue: premium
  walltime: "24:00"  # hours:minutes
  cores: 12
  mem_per_core: 8000  # MB
  orchestrator:
    poll_interval: 60  # sec
    training_timeout: 20.0  # hr
    post_timeout: 2.0  # hr
    perm_timeout: 20.0  # hr
    panel_timeout: 10.0  # hr
    consensus_timeout: 8.0  # hr
    max_concurrent_submissions: 20
    cores: 1
    mem_per_core: 2000
    walltime: "60:00"
