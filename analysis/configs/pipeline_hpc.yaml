# Pipeline Configuration - HPC Environment
# Deep-merged on top of pipeline_local.yaml via _base.
# Only values that differ from local defaults are listed here.

_base: pipeline_local.yaml

environment: hpc

configs:
  training: configs/training_config.yaml

pipeline:
  models:
    - LR_EN
    - LinSVM_cal
    - RF
    - XGBoost
  ensemble: true
  consensus: true
  optimize_panel: true
  permutation_test: true  # Enable for model significance testing
  dry_run: false

# HPC Settings (LSF/Slurm)
hpc:
  scheduler: lsf  # lsf or slurm
  project: acc_Chipuk_Laboratory  # Required: update before use
  queue: premium
  walltime: "48:00"  # hours:minutes
  cores: 12
  mem_per_core: 8000  # MB
  orchestrator:
    poll_interval: 60  # seconds between sentinel checks
    training_timeout: 4.0  # hours
    post_timeout: 2.0  # hours
    perm_timeout: 4.0  # hours
    panel_timeout: 2.0  # hours
    consensus_timeout: 1.0  # hours
    max_concurrent_submissions: 20
    cores: 1
    mem_per_core: 2000
    walltime: "48:00"
