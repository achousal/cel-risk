# Pipeline Configuration - HPC Environment
# Deep-merged on top of pipeline_local.yaml via _base.
# Only values that differ from local defaults are listed here.

_base: pipeline_local.yaml

environment: hpc

configs:
  training: configs/training_config.yaml

pipeline:
  models:
    - LR_EN
    - LinSVM_cal
    - RF
    - XGBoost
  ensemble: true
  consensus: true
  optimize_panel: true
  permutation_test: true  # Enable for model significance testing
  dry_run: false
  # Note: Scientific parameters (n_boot, permutation_n_perms, etc.) are defined in their respective configs:
  #   - n_boot: training_config.yaml
  #   - permutation_n_perms, permutation_n_jobs: permutation_test.yaml

# HPC Settings (LSF/Slurm)
hpc:
  scheduler: lsf  # lsf or slurm
  project: acc_Chipuk_Laboratory  # Required: update before use
  queue: premium
  walltime: "48:00"  # hours:minutes
  cores: 12
  mem_per_core: 8000  # MB
  orchestrator:
    poll_interval: 60
    training_timeout: 14400
    post_timeout: 7200
    perm_timeout: 14400
    panel_timeout: 7200
    consensus_timeout: 3600
    max_concurrent_submissions: 20
    cores: 1
    mem_per_core: 2000
    walltime: "48:00"
