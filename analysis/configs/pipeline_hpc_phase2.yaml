# Pipeline Configuration - HPC Phase 2: Fixed Panel Validation
# Validates 7-protein RRA-significant panel on fresh splits.
# Source panel: run_20260317_131842/consensus/final_panel.csv

_base: pipeline_local.yaml

environment: hpc

configs:
  training: configs/training_config_val_consensus.yaml

pipeline:
  models:
    - LR_EN
    - LinSVM_cal
    - RF
    - XGBoost
  split_seeds: [200, 201, 202, 203, 204, 205, 206, 207, 208, 209, 210, 211, 212, 213, 214, 215, 216, 217, 218, 219, 220, 221, 222, 223, 224, 225, 226, 227, 228, 229]
  ensemble: true
  consensus: false       # N/A: fixed panel
  optimize_panel: false  # N/A: fixed panel
  permutation_test: true
  dry_run: false

# HPC Settings (LSF)
hpc:
  scheduler: lsf
  project: acc_vascbrain
  queue: premium
  walltime: "24:00"
  cores: 12
  mem_per_core: 8000
  orchestrator:
    poll_interval: 60
    training_timeout: 20.0
    aggregation_timeout: 2.0
    ensemble_timeout: 4.0
    post_timeout: 2.0
    perm_timeout: 20.0
    panel_timeout: 10.0
    consensus_timeout: 20.0
    max_concurrent_submissions: 20
    cores: 1
    mem_per_core: 2000
    walltime: "72:00"
