environment: hpc
paths:
  infile: ../data/Celiac_dataset_proteomics_w_demo.parquet
  splits_dir: ../splits
  results_dir: ../results
  logs_dir: ../logs
configs:
  splits: configs/splits_config.yaml
  training: configs/training_config.yaml
pipeline:
  models:
  - RF
  ensemble: false
  consensus: false
  optimize_panel: false
  permutation_test: false
  dry_run: false
hpc:
  scheduler: lsf
  project: acc_vascbrain
  queue: premium
  walltime: '24:00'
  cores: 12
  mem_per_core: 8000
  orchestrator:
    poll_interval: 60
    training_timeout: 20.0
    aggregation_timeout: 2.0
    ensemble_timeout: 4.0
    post_timeout: 2.0
    perm_timeout: 20.0
    panel_timeout: 10.0
    consensus_timeout: 20.0
    max_concurrent_submissions: 20
    cores: 1
    mem_per_core: 2000
    walltime: '72:00'
