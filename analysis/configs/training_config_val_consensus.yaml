# Training config for Phase 2: consensus panel validation
# Validates 7-protein RRA-significant panel (BH p<0.05) on fresh non-overlapping seeds (200-209).
# All settings inherited from training_config.yaml except feature selection.
# Source: run_20260317_131842/consensus/final_panel.csv
_base: training_config.yaml

features:
  feature_selection_strategy: fixed_panel
  fixed_panel_csv: "fixed_panel.csv"  # 7-protein RRA-significant panel from Phase 1

# Reduced Optuna trials for fixed panel (7 features doesn't need 300 trials)
optuna:
  n_trials: 50
