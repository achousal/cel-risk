# Incident-only + 4-protein holdout splits (no control downsampling)
# Carves out 30% holdout, trains on remaining 70%. Pairs with training_config_log.yaml.
_base: ../../splits_config.yaml

mode: holdout
scenarios:
  - IncidentOnly
holdout_size: 0.30

n_splits: 11
seed_start: 20

train_control_per_case: null
eval_control_per_case: null
