# Training config: 4-protein panel, incident-only scenario, log class weighting
# Implements the winning cell of incident_validation_report_2026-04-01 (§6):
# incident_only + log → AUPRC 0.2152 vs 0.1245 for incident_only + balanced.
# The log token is resolved per CV fold to {0: 1, 1: log(n_neg/n_pos)}.
_base: ../4protein/training_config_val_4protein.yaml

scenario: IncidentOnly

svm:
  class_weight_options: log

lr:
  class_weight_options: log
