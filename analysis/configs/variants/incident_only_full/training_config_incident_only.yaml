# Training config: full-pipeline feature selection under incident-only + log weight
#
# Implements the winning configuration from incident_validation_report_2026-04-01:
#   - Train on incident cases only (119 pre-diagnostic cases)
#   - log class weight (~5.7×, applied per fold by the runtime resolver)
#
# Unlike the 4-protein validation configs, this inherits the canonical training
# config (multi_stage feature selection, all 4 models) and re-runs Phase-1-style
# discovery under the new scenario/weight combo. The consensus panel produced
# here is the refreshed replacement for the 7-protein gip-containing panel.
_base: ../../training_config.yaml

scenario: IncidentOnly

# Log class weight for all linear/RF models. XGBoost inherits its
# scale_pos_weight_grid ([3, 5, 7, 10]) which already brackets log(44000/120) ≈ 5.9.
lr:
  class_weight_options: log

svm:
  class_weight_options: log

rf:
  class_weight_options: log
