# Pipeline: SVM purity 5-protein panel, incident + prevalent-in-train (1:1), full model sweep, log weight.
# Full sweep: LR_EN, LR_L1, LinSVM_cal, LinSVM_L1_cal, RF, XGBoost + stacking ensemble + permutation test.
_base: ../../pipeline_hpc.yaml

paths:
  splits_dir: ../splits_svm_purity_val_log_aug11

configs:
  training: configs/variants/svm_purity/training_config_log.yaml
  splits: configs/variants/svm_purity/splits_config_val_log_aug11.yaml

pipeline:
  models:
    - LR_EN
    - LR_L1
    - LinSVM_cal
    - LinSVM_L1_cal
    - RF
    - XGBoost
  ensemble: true
  optimize_panel: false     # fixed panel — no feature selection
  consensus: false          # fixed panel — no per-model ranking to aggregate
  permutation_test: true    # validate signal significance across all 6 models
