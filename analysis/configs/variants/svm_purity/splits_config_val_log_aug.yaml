# Splits: purity panel, incident + prevalent-in-train (1:2 ratio), no downsampling.
# Train positives: ~74 incident + ~37 prevalent (0.25 * 150). Val/test: incident-only.
# Pairs with training_config_log.yaml (reused) and pipeline_hpc_val_log_aug.yaml.
_base: ../../splits_config.yaml

mode: development
scenarios:
  - IncidentPlusPrevalent

n_splits: 11
seed_start: 20

prevalent_train_only: true
prevalent_train_frac: 0.25  # ~37/150 → 1:2 prevalent:incident in train

train_control_per_case: null
eval_control_per_case: null
