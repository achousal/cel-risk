# Splits: purity panel, incident + prevalent-in-train (1:1 ratio), no downsampling.
# Train positives: ~74 incident + ~75 prevalent (0.5 * 150). Val/test: incident-only.
# Pairs with training_config_log.yaml (log class weight) and pipeline_hpc_val_log_aug11_full.yaml.
_base: ../../splits_config.yaml

mode: development
scenarios:
  - IncidentPlusPrevalent

n_splits: 11
seed_start: 20

prevalent_train_only: true
prevalent_train_frac: 0.5  # ~75/150 → 1:1 prevalent:incident in train

train_control_per_case: null
eval_control_per_case: null
