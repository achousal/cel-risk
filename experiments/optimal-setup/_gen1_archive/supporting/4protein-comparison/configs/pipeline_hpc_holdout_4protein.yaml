# Pipeline config for Phase 3: holdout evaluation (4-protein panel)
# Trains on dev portion (70%) with fixed 4-protein panel, evaluates on 30% holdout.
# Head-to-head comparison with 7-protein holdout (pipeline_hpc_holdout.yaml).
_base: pipeline_hpc.yaml

configs:
  training: configs/training_config_holdout_4protein.yaml
  splits: configs/splits_config_holdout.yaml

pipeline:
  optimize_panel: false
  consensus: false
  permutation_test: false
