# Minimal cellml experiment template.
# ~20 cells (1 panel x 1 model x 3 cal x 3 wt x 3 ds ~ 27 — trimmed to 20
# via single weighting + single downsampling below for a true smoke).
#
# Swap name in place when using `ced cellml init <name> --template minimal`.
name: minimal_smoke
description: "1 panel, LR_EN, 1 scenario — pipeline smoke test."

base_configs:
  training: analysis/configs/training_config.yaml
  pipeline: analysis/configs/pipeline_hpc.yaml
  splits: analysis/configs/splits_config.yaml

trunks:
  - id: T1_consensus
    description: "Consensus operating trunk"
    proteins_csv: results/_archive/gen1/rra_universe_sensitivity/rra_significance_corrected.csv
    sweep_csv: results/_archive/gen1/compiled/compiled_results_aggregated.csv

panels:
  - id: R1_sig
    source: derived
    trunk_id: T1_consensus
    ordering:
      type: consensus_score_descending
      params:
        score_column: observed_rra
        q_column: bh_adjusted_p
        q_threshold: 0.05
    size_rule:
      type: significance_count
      params:
        q_threshold: 0.05

axes:
  # 1 x 2 x 2 x 5 = 20 cells
  model: [LR_EN]
  calibration: [logistic_intercept, beta]
  weighting: [log, none]
  downsampling: [1.0, 1.5, 2.0, 3.0, 5.0]
  scenario: []
  feature_selection: [fixed_panel]
  control_ratio: [5]

seeds: {start: 100, end: 119}
optuna: {n_trials: 50}

resources:
  wall: "12:00"
  cores: 8
  mem_mb_per_core: 4000
  queue: premium
  project: acc_vascbrain
