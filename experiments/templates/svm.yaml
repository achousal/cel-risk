# SVM-focused cellml template.
# 2 SVM models x 3 cal x 3 wt x 3 ds x 1 scenario = 54 cells.
name: svm_template
description: "SVM variants, full cal x wt x ds, IncidentPlusPrevalent scenario."

base_configs:
  training: analysis/configs/training_config.yaml
  pipeline: analysis/configs/pipeline_hpc.yaml
  splits: analysis/configs/splits_config.yaml

trunks:
  - id: T1_consensus
    description: "Consensus operating trunk"
    proteins_csv: results/_archive/gen1/rra_universe_sensitivity/rra_significance_corrected.csv
    sweep_csv: results/_archive/gen1/compiled/compiled_results_aggregated.csv

panels:
  - id: R1_sig
    source: derived
    trunk_id: T1_consensus
    ordering:
      type: consensus_score_descending
      params:
        score_column: observed_rra
        q_column: bh_adjusted_p
        q_threshold: 0.05
    size_rule:
      type: significance_count
      params:
        q_threshold: 0.05

axes:
  model: [LinSVM_cal, LinSVM_L1_cal]
  calibration: [logistic_intercept, beta, isotonic]
  weighting: [log, sqrt, none]
  downsampling: [1.0, 2.0, 5.0]
  scenario:
    - name: IncidentPlusPrevalent_0.5
      scenarios: [IncidentPlusPrevalent]
      prevalent_train_only: true
      prevalent_train_frac: 0.5
  feature_selection: [fixed_panel]
  control_ratio: [5]

seeds: {start: 100, end: 119}
optuna: {n_trials: 200}

resources:
  wall: "48:00"
  cores: 12
  mem_mb_per_core: 8000
  queue: premium
  project: acc_vascbrain
