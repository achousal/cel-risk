id: "09_downsampling_ratio"
question: "What downsampling ratio optimizes AUPRC without destroying calibration?"
sweep_type: config_only

# Dataset-agnostic: reference by name, orchestrator resolves paths
base_recipe: "R1_plateau"
base_cell: "LinSVM_cal_logistic_intercept_log_ds1"

metric: "summary_auroc_mean"
metric_direction: maximize
baseline_value: null  # null = first iteration establishes baseline

parameter_space:
  data.downsample_majority_ratio:
    type: choice
    values: [1.0, 2.0, 3.0, 5.0, 10.0, 20.0]

prerequisites:
  - "results/factorial_compiled.csv"

constraints:
  max_iterations: 8
  max_wall_hours: 24
  seeds: [100, 101, 102, 103, 104]
  optuna_trials: 50
  improvement_threshold: 0.005
  consecutive_no_improve: 3

# Dataset reference for calibration fingerprinting
data_path: "data/Celiac_dataset_proteomics_w_demo.parquet"
label_col: "CeD_comparison"
scenario: "IncidentOnly"    # Controls + Incident (prospective prediction)

# Pre-sweep calibration (Rules 1-20 in calibration_schema.py).
# Space is 6 discrete values -- calibration required=false is defensible
# here (exhaustible), but left true to exercise the mechanism end-to-end.
calibration:
  required: true
  budget_fraction: 0.10
  hard_cap_wall_hours: 1.0
  min_trials: 12
  max_trials: 30
  trials_per_dim: 15
  sampler: tpe
  calib_seed: 0
  subsample_rows: 3000
  cache_days: 30
  min_viable_objective: 0.60    # AUROC floor; below this, block sweep
  absolute_min_cap: 10
  absolute_max_cap: 50          # small discrete space; cap low
  cap_safety_multiplier: 1.5
  min_patience: 3
  max_patience: 10
  patience_fraction_of_plateau: 0.3
